[mcp_servers.agentation]
args = [
    "-y",
    "agentation-mcp",
    "server",
]
command = "npx"

[mcp_servers.supabase]
url = "https://mcp.supabase.com/mcp?project_ref=wdgsbgyaqltvcvyatkpp"

[mcp_servers.toolrouter]
args = [
    "--workspace",
    "@toolrouter/mcp",
    "run",
    "start",
]
command = "npm"

[mcp_servers.toolrouter.env]
TOOLROUTER_API_URL = "https://toolrouter.world"
